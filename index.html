<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSc SE Grade Tracker - Mbarara University</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="app.js" defer></script>
</head>

<body>
    <div id="onboarding-overlay" class="overlay hidden"></div>
    <div id="pin-overlay" class="overlay hidden"></div>

    <div id="app" class="app-shell hidden">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-head">
                <h1>SE Grade Tracker</h1>
                <p>Mbarara University · Mubiru Elton Felix</p>
            </div>

            <nav id="sidebar-nav" class="sidebar-nav" aria-label="Main navigation">
                <button class="nav-item active" data-page="dashboard" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8v10h-6v-6H9v6H3z"></path></svg>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-page="grades" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v3H5zm0 6h14v3H5zm0 6h14v3H5z"></path></svg>
                    <span>My Grades</span>
                </button>
                <button class="nav-item" data-page="forecast" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17l6-6 4 4 7-8 1.5 1.3L13 18l-4-4-4.5 4.5z"></path></svg>
                    <span>Forecast</span>
                </button>
                <button class="nav-item" data-page="timetable" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2v2H5a2 2 0 0 0-2 2v13a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2zM5 10h14v9a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1z"></path></svg>
                    <span>Timetable</span>
                </button>
                <button class="nav-item" data-page="insights" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V10h3v10zm6 0V4h3v16zm6 0v-7h3v7z"></path></svg>
                    <span>Insights</span>
                </button>
                <button class="nav-item" data-page="settings" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.4 13a7.8 7.8 0 0 0 0-2l2-1.6-2-3.4-2.4 1a7.5 7.5 0 0 0-1.7-1l-.4-2.6h-4l-.4 2.6a7.5 7.5 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6a7.8 7.8 0 0 0 0 2l-2 1.6 2 3.4 2.4-1a7.5 7.5 0 0 0 1.7 1l.4 2.6h4l.4-2.6a7.5 7.5 0 0 0 1.7-1l2.4 1 2-3.4zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5"></path></svg>
                    <span>Settings</span>
                </button>
            </nav>

            <div class="sidebar-foot">
                <small id="sidebar-user-id">ID: ...</small>
            </div>
        </aside>

        <main id="main-content" class="main-content">
            <header id="topbar" class="topbar">
                <div>
                    <h2 id="greeting-text">Good morning</h2>
                </div>
                <div class="topbar-right">
                    <div class="topbar-cgpa">
                        <span id="topbar-cgpa" class="mono-number">0.00</span>
                    </div>
                    <span id="topbar-class" class="badge">Pass</span>
                </div>
            </header>
            <div id="page-content" class="page-content"></div>
        </main>
    </div>

    <nav id="mobile-tabs" class="mobile-tabs" aria-label="Mobile tabs">
        <button data-page="dashboard" class="mobile-tab active" type="button" aria-label="Dashboard">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11l9-8 9 8v10h-6v-6H9v6H3z"></path></svg>
        </button>
        <button data-page="grades" class="mobile-tab" type="button" aria-label="My Grades">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v3H5zm0 6h14v3H5zm0 6h14v3H5z"></path></svg>
        </button>
        <button data-page="forecast" class="mobile-tab" type="button" aria-label="Forecast">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 17l6-6 4 4 7-8 1.5 1.3L13 18l-4-4-4.5 4.5z"></path></svg>
        </button>
        <button data-page="timetable" class="mobile-tab" type="button" aria-label="Timetable">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2v2H5a2 2 0 0 0-2 2v13a3 3 0 0 0 3 3h12a3 3 0 0 0 3-3V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2zM5 10h14v9a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1z"></path></svg>
        </button>
        <button data-page="insights" class="mobile-tab" type="button" aria-label="Insights">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V10h3v10zm6 0V4h3v16zm6 0v-7h3v7z"></path></svg>
        </button>
    </nav>

    <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
</body>

</html>
